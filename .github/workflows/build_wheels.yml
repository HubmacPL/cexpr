name: Build and upload wheels

on:
  push:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel cibuildwheel==2.5.0
      - name: Quick local wheel build (debug)
        run: |
          # try building a wheel on the runner to expose compile errors before cibuildwheel/Docker
          python -m pip install --upgrade pip setuptools wheel
          python -m pip wheel . -w wheelhouse-local || true
      - name: Build wheels
        run: |
          # run cibuildwheel and save stdout/stderr to a log file for debugging
          python -m cibuildwheel --output-dir wheelhouse 2>&1 | tee cibuildwheel-output.log
        continue-on-error: true
      - name: Upload cibuildwheel log
        uses: actions/upload-artifact@v4
        with:
          name: cibuildwheel-log
          path: cibuildwheel-output.log
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse
