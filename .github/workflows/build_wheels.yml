name: Build and upload wheels

on:
  push:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel cibuildwheel==2.5.0
      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir wheelhouse
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse
